<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sobre-linguagens-web - Cadastro</title>
    <link rel="stylesheet" href="assets/css/auth.css" />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>

<body>
    <main class="auth-page">
        <div class="auth-container">
            <section class="auth-card">
                <h2>Criar Conta</h2>
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: Teunome" required />
                        <div class="error-message" id="nomeError">Por favor, insira um nome.</div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Ex: teunome@gmail.com" required />
                        <div class="error-message" id="emailError">Por favor, insira um email válido.</div>
                    </div>
                    <div class="form-group">
                        <label for="sexo">Sexo:</label>
                        <select id="sexo" name="sexo">
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Prefiro não informar</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha:</label>
                        <input type="password" id="password" name="password" placeholder="Digite a sua senha"
                            required />
                        <div class="error-message" id="passwordError">A sua senha deve ter pelo menos 6 caracteres.
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Senha:</label>
                        <input type="password" id="confirm-password" name="confirm-password"
                            placeholder="Confirme a sua senha" required />
                        <div class="error-message" id="confirmPasswordError">As senhas devem ser iguais.
                        </div>
                    </div>
                    <button type="submit">Entrar</button>
                    <div class="form-links">
                        <a href="login.html">Voltar ao Login</a>
                        <a href="index.html"><i class="fa fa-home"></i></a>
                    </div>
                </form>
            </section>
            <section class="auth-info">
                <h2>Bem-vindo de volta!</h2>
                <p>Faça login para acessar o conteúdo exclusivo sobre linguagens web e continue sua jornada de
                    aprendizado.
                </p>
                <img src="assets/img/logo.png" alt="logo" />
            </section>
        </div>
    </main>
    <script src="assets/js/auth.js"></script>
</body>

</html>
